<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspecciones SITOC</title>
<script>
// Carga MSAL dinámicamente con fallback
(function() {
  var urls = [
    "https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js",
    "https://unpkg.com/@azure/msal-browser@2.38.3/dist/msal-browser.min.js",
    "https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/dist/msal-browser.min.js"
  ];
  var idx = 0;
  function cargar() {
    if (idx >= urls.length) {
      document.getElementById("loginError").innerHTML =
        '<div class="error-msg" style="margin-top:16px;max-width:320px;">No se pudo cargar la librería de autenticación. Verifica tu conexión a internet.</div>';
      return;
    }
    var s = document.createElement("script");
    s.src = urls[idx++];
    s.onload = function() { console.log("MSAL cargado desde:", s.src); };
    s.onerror = function() { console.warn("Falló:", s.src); cargar(); };
    document.head.appendChild(s);
  }
  cargar();
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --azul:#0b3d5c;
    --azul-osc:#082d44;
    --naranja:#e8731c;
    --gris-claro:#f4f6f8;
    --gris-borde:#d3dbe2;
    --texto:#1c2b36;
    --verde:#2e7d4f;
    --rojo:#c0392b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--gris-claro);
    color:var(--texto);
  }
  header{
    background:var(--azul);
    color:#fff;
    padding:16px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:10;
  }
  header h1{
    font-size:18px;
    margin:0;
    font-weight:700;
    letter-spacing:.3px;
  }
  header .sub{
    font-size:12px;
    opacity:.8;
    margin-top:2px;
  }
  #btnLogout{
    background:transparent;
    border:1px solid rgba(255,255,255,.5);
    color:#fff;
    padding:8px 14px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
  }
  main{
    max-width:560px;
    margin:0 auto;
    padding:20px 16px 80px;
  }
  .card{
    background:#fff;
    border-radius:10px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
    border:1px solid var(--gris-borde);
  }
  .card h2{
    font-size:15px;
    margin:0 0 14px;
    color:var(--azul-osc);
    text-transform:uppercase;
    letter-spacing:.5px;
    font-weight:700;
  }
  label{
    display:block;
    font-size:14px;
    font-weight:600;
    margin-bottom:6px;
    color:var(--texto);
  }
  select, input[type=text], input[type=date], textarea{
    width:100%;
    padding:13px 12px;
    font-size:16px;
    border:1.5px solid var(--gris-borde);
    border-radius:8px;
    margin-bottom:14px;
    background:#fff;
    color:var(--texto);
    font-family:inherit;
  }
  select:disabled, input:disabled{
    background:#eef1f3;
    color:#8a97a1;
  }
  textarea{resize:vertical;min-height:80px;}
  .campo-libre{
    border:1.5px dashed var(--gris-borde);
    border-radius:8px;
    padding:14px;
    margin-bottom:12px;
    position:relative;
  }
  .campo-libre input{margin-bottom:8px;}
  .campo-libre input:last-child{margin-bottom:0;}
  .btn-quitar-campo{
    position:absolute;
    top:8px;
    right:8px;
    background:none;
    border:none;
    color:var(--rojo);
    font-size:18px;
    cursor:pointer;
    line-height:1;
    padding:4px 8px;
  }
  .btn-secundario{
    width:100%;
    padding:12px;
    background:var(--gris-claro);
    border:1.5px dashed var(--azul);
    color:var(--azul);
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-primario{
    width:100%;
    padding:16px;
    background:var(--naranja);
    border:none;
    color:#fff;
    border-radius:10px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:6px;
  }
  .btn-primario:disabled{
    background:#c9c9c9;
    cursor:not-allowed;
  }
  .btn-ubicacion{
    width:100%;
    padding:13px;
    background:#fff;
    border:1.5px solid var(--azul);
    color:var(--azul);
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .ubicacion-ok{
    font-size:13px;
    color:var(--verde);
    margin-bottom:14px;
    margin-top:-6px;
  }
  .fotos-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:14px;
  }
  .foto-thumb{
    position:relative;
    aspect-ratio:1;
    border-radius:8px;
    overflow:hidden;
    border:1px solid var(--gris-borde);
  }
  .foto-thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .foto-thumb button{
    position:absolute;
    top:4px;
    right:4px;
    background:rgba(0,0,0,.6);
    color:#fff;
    border:none;
    border-radius:50%;
    width:22px;
    height:22px;
    font-size:13px;
    cursor:pointer;
  }
  .input-foto-wrap{
    display:flex;
    gap:10px;
  }
  .input-foto-wrap label{
    flex:1;
    text-align:center;
    background:var(--azul);
    color:#fff;
    padding:13px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    margin:0;
  }
  input[type=file]{display:none;}
  #pantallaLogin{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:80vh;
    padding:20px;
    text-align:center;
  }
  #pantallaLogin h1{
    color:var(--azul-osc);
    font-size:22px;
    margin-bottom:8px;
  }
  #pantallaLogin p{
    color:#5a6b76;
    margin-bottom:28px;
    font-size:14px;
  }
  #btnLogin{
    background:var(--azul);
    color:#fff;
    border:none;
    padding:16px 32px;
    border-radius:10px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .oculto{display:none !important;}
  #estadoEnvio{
    position:fixed;
    inset:0;
    background:rgba(8,45,68,.94);
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:24px;
    text-align:center;
  }
  #estadoEnvio .spinner{
    width:42px;
    height:42px;
    border:4px solid rgba(255,255,255,.25);
    border-top-color:#fff;
    border-radius:50%;
    animation:girar 0.8s linear infinite;
    margin-bottom:18px;
  }
  @keyframes girar{to{transform:rotate(360deg);}}
  #estadoEnvio p{font-size:15px;margin:4px 0;}
  #pantallaExito{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:80vh;
    padding:24px;
    text-align:center;
  }
  #pantallaExito .check{
    width:64px;
    height:64px;
    background:var(--verde);
    border-radius:50%;
    color:#fff;
    font-size:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:16px;
  }
  #pantallaExito h2{color:var(--azul-osc);margin-bottom:6px;}
  #pantallaExito p{color:#5a6b76;font-size:14px;margin-bottom:24px;}
  .error-msg{
    background:#fdecea;
    border:1px solid #f5c6c1;
    color:var(--rojo);
    padding:12px;
    border-radius:8px;
    font-size:13px;
    margin-bottom:14px;
  }
  .hint{
    font-size:12px;
    color:#7c8a94;
    margin-top:-10px;
    margin-bottom:14px;
  }
</style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="pantallaLogin">
  <h1>Inspecciones SITOC</h1>
  <p>Inicia sesión con tu cuenta corporativa para registrar una inspección.</p>
  <button id="btnLogin">Iniciar sesión con Microsoft</button>
  <div id="loginError"></div>
</div>

<!-- APP PRINCIPAL -->
<div id="appPrincipal" class="oculto">
  <header>
    <div>
      <h1>Nueva inspección</h1>
      <div class="sub" id="nombreUsuario"></div>
    </div>
    <button id="btnLogout">Salir</button>
  </header>

  <main>
    <div class="card">
      <h2>Ubicación de trabajo</h2>
      <label for="selCliente">Cliente</label>
      <select id="selCliente"><option value="">Cargando...</option></select>

      <label for="selProyecto">Proyecto</label>
      <select id="selProyecto" disabled><option value="">Elige un cliente primero</option></select>

      <label for="selActividad">Actividad</label>
      <select id="selActividad" disabled><option value="">Elige un proyecto primero</option></select>
    </div>

    <div class="card">
      <h2>Datos generales</h2>
      <label for="inpTecnico">Técnico</label>
      <input type="text" id="inpTecnico" placeholder="Tu nombre completo">

      <label for="inpFecha">Fecha</label>
      <input type="date" id="inpFecha">

      <button class="btn-ubicacion" id="btnGPS">📍 Capturar ubicación GPS</button>
      <div id="ubicacionTexto" class="ubicacion-ok oculto"></div>

      <label for="inpNotas">Notas / observaciones generales</label>
      <textarea id="inpNotas" placeholder="Describe lo encontrado, condiciones, novedades..."></textarea>
    </div>

    <div class="card">
      <h2>Detalle de campo (opcional)</h2>
      <div id="camposLibres"></div>
      <button type="button" class="btn-secundario" id="btnAgregarCampo">+ Agregar pregunta/respuesta</button>
    </div>

    <div class="card">
      <h2>Fotos</h2>
      <div class="fotos-grid" id="fotosGrid"></div>
      <div class="input-foto-wrap">
        <label for="inputCamara">📷 Tomar foto</label>
        <label for="inputGaleria">🖼️ Elegir de galería</label>
      </div>
      <input type="file" id="inputCamara" accept="image/*" capture="environment" multiple>
      <input type="file" id="inputGaleria" accept="image/*" multiple>
      <div class="hint" id="contadorFotos">0 fotos agregadas</div>
    </div>

    <div id="errorEnvioWrap"></div>
    <button class="btn-primario" id="btnEnviar">Enviar inspección</button>
  </main>
</div>

<!-- OVERLAY DE ENVÍO -->
<div id="estadoEnvio" class="oculto">
  <div class="spinner"></div>
  <p id="estadoEnvioTexto">Preparando envío...</p>
</div>

<!-- PANTALLA DE ÉXITO -->
<div id="pantallaExito" class="oculto">
  <div class="check">✓</div>
  <h2>Inspección enviada</h2>
  <p id="exitoDetalle"></p>
  <button class="btn-primario" id="btnNuevaInspeccion" style="max-width:280px;">Registrar otra inspección</button>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
